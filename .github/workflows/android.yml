Ôªøname: Android APK Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release:
        description: 'Release build (imzalanmis AAB uret)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: npm ci

      # .env.production repoda saxlanmƒ±r (t…ôhl√ºk…ôsizlik). Build √º√ß√ºn burada yaradƒ±lƒ±r.
      # GitHub repo Variables qoyulubsa onlar, yoxsa a√ßƒ±q (client-side) defolt d…ôy…ôrl…ôr istifad…ô olunur.
      - name: Create .env.production
        run: |
          cat > .env.production <<'EOF'
          VITE_API_URL=${{ vars.VITE_API_URL || 'https://evden-backend.onrender.com' }}
          VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID || '397810655273-kdet77p6l6lf2lkg5to7shs2vchr2oor.apps.googleusercontent.com' }}
          VITE_TURN_URLS=${{ vars.VITE_TURN_URLS || 'turn:free.expressturn.com:3478,turn:free.expressturn.com:3478?transport=tcp' }}
          VITE_TURN_USERNAME=${{ vars.VITE_TURN_USERNAME || '000000002096222293' }}
          VITE_TURN_CREDENTIAL=${{ vars.VITE_TURN_CREDENTIAL || 'IqJM8Xin2Ad6NOtRrg8fKAurxU4=' }}
          EOF
          echo "VITE_API_URL=$(grep VITE_API_URL .env.production)"

      - name: Build web (production)
        run: npm run build

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Apply fixed debug keystore (sabit SHA-1 / Google sign-in)
        run: |
          if [ -f android/app/evden-debug.keystore ]; then
            mkdir -p ~/.android
            cp android/app/evden-debug.keystore ~/.android/debug.keystore
            echo "Sabit debug keystore t…ôtbiq edildi (sabit SHA-1)."
          else
            echo "Sabit keystore tapƒ±lmadƒ± ‚Äî 'Setup Fixed Debug Keystore' workflow-nu i≈ü…ô sal."
          fi

      - name: Build DEBUG APK
        if: ${{ github.event_name == 'push' || inputs.release != true }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Print APK REAL signing SHA-1 (Firebase il…ô m√ºqayis…ô √º√ß√ºn)
        if: ${{ github.event_name == 'push' || inputs.release != true }}
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          echo "## APK-nƒ±n H∆èQƒ∞Qƒ∞ imza SHA-1-i" >> $GITHUB_STEP_SUMMARY
          echo "Bu, APK-nƒ±n …ôslind…ô imzalandƒ±ƒüƒ± sertifikatdƒ±r. Firebase-d…ôki SHA-1 il…ô EYNƒ∞ olmalƒ±dƒ±r." >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # apksigner il…ô APK-nƒ±n …ôsl sertifikatƒ±nƒ± √ßƒ±xar
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner 2>/dev/null | sort -r | head -1)
          if [ -n "$APKSIGNER" ] && [ -f "$APK" ]; then
            "$APKSIGNER" verify --print-certs "$APK" 2>/dev/null | grep -Ei "SHA-1|SHA-256" >> $GITHUB_STEP_SUMMARY || echo "apksigner SHA tapƒ±lmadƒ±" >> $GITHUB_STEP_SUMMARY
          else
            # fallback: keytool il…ô
            keytool -printcert -jarfile "$APK" 2>/dev/null | grep -Ei "SHA1:|SHA-1:|SHA256:" >> $GITHUB_STEP_SUMMARY || echo "keytool SHA tapƒ±lmadƒ±" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Package: az.evden.mobile" >> $GITHUB_STEP_SUMMARY
          echo "Firebase-d…ô olmalƒ±: D6:0D:CD:90:3A:86:93:42:AB:2F:2D:94:86:1A:74:75:97:DB:27:9F" >> $GITHUB_STEP_SUMMARY

      - name: Upload DEBUG APK
        if: ${{ github.event_name == 'push' || inputs.release != true }}
        uses: actions/upload-artifact@v4
        with:
          name: evden-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # ---- RELEASE (signed AAB, Play Store icin) ----
      - name: Decode keystore
        if: ${{ inputs.release == true }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/app/release.keystore

      - name: Build RELEASE AAB (signed)
        if: ${{ inputs.release == true }}
        working-directory: android
        env:
          ONLUQ_KEYSTORE_PATH: release.keystore
          ONLUQ_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ONLUQ_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ONLUQ_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload RELEASE AAB
        if: ${{ inputs.release == true }}
        uses: actions/upload-artifact@v4
        with:
          name: evden-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
