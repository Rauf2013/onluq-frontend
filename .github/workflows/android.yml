name: Android APK Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release:
        description: 'Release build (imzalanmis AAB uret)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: npm ci

      - name: Build web (production)
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.tars.az' }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build DEBUG APK
        if: ${{ github.event_name == 'push' || inputs.release != true }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload DEBUG APK
        if: ${{ github.event_name == 'push' || inputs.release != true }}
        uses: actions/upload-artifact@v4
        with:
          name: onluq-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # ---- RELEASE (signed AAB, Play Store icin) ----
      - name: Decode keystore
        if: ${{ inputs.release == true }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/app/release.keystore

      - name: Build RELEASE AAB (signed)
        if: ${{ inputs.release == true }}
        working-directory: android
        env:
          ONLUQ_KEYSTORE_PATH: release.keystore
          ONLUQ_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ONLUQ_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ONLUQ_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload RELEASE AAB
        if: ${{ inputs.release == true }}
        uses: actions/upload-artifact@v4
        with:
          name: onluq-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
