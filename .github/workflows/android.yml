name: Android APK Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release:
        description: 'Release build (imzalanmis AAB uret)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: npm ci

      - name: Build web (production)
        run: npm run build
        # NOT: VITE_* dəyişənlər .env.production-dan oxunur. Burada override etmirik
        # cünki bos vars onlari sifirlayardi. Override lazımdırsa repo Variables/Secrets-da
        # VITE_API_URL_OVERRIDE qoy və burada istifade et.

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build DEBUG APK
        if: ${{ github.event_name == 'push' || inputs.release != true }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Print debug keystore SHA-1 (Google Cloud Console icin)
        if: ${{ github.event_name == 'push' || inputs.release != true }}
        run: |
          KEYSTORE=$HOME/.android/debug.keystore
          if [ -f "$KEYSTORE" ]; then
            echo "===== Debug keystore SHA-1 ====="
            keytool -list -v -keystore "$KEYSTORE" -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep -E "SHA1|SHA-1|Sertifikat barmaq izi" || true
            echo "================================"
            echo "Package name: az.onluq.app"
            echo ""
            echo "NOT: Bu SHA-1 her runda ferqlidir cunku GitHub Actions her seferinde rastgele keystore yaradir."
            echo "Stabil SHA-1 ucun ANDROID_DEBUG_KEYSTORE_B64 secret-i qoy."
          fi

      - name: Upload DEBUG APK
        if: ${{ github.event_name == 'push' || inputs.release != true }}
        uses: actions/upload-artifact@v4
        with:
          name: onluq-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # ---- RELEASE (signed AAB, Play Store icin) ----
      - name: Decode keystore
        if: ${{ inputs.release == true }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/app/release.keystore

      - name: Build RELEASE AAB (signed)
        if: ${{ inputs.release == true }}
        working-directory: android
        env:
          ONLUQ_KEYSTORE_PATH: release.keystore
          ONLUQ_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ONLUQ_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ONLUQ_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload RELEASE AAB
        if: ${{ inputs.release == true }}
        uses: actions/upload-artifact@v4
        with:
          name: onluq-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
