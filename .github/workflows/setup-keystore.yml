name: Setup Fixed Debug Keystore

# Bir dəfə əl ilə işə salınır (Actions > Setup Fixed Debug Keystore > Run workflow).
# Sabit SHA-1 üçün dəyişməz debug keystore yaradır, repoya commit edir və SHA-1-i göstərir.
# O SHA-1-i Google Cloud Console-a Android OAuth client kimi əlavə et.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Generate fixed debug keystore (if missing)
        run: |
          mkdir -p android/app
          if [ -f android/app/evden-debug.keystore ]; then
            echo "Keystore artıq mövcuddur — təkrar yaradılmır."
          else
            keytool -genkeypair -v \
              -keystore android/app/evden-debug.keystore \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=EVDEN, OU=EVDEN, O=EVDEN, L=Baku, ST=Baku, C=AZ"
            echo "Yeni keystore yaradıldı."
          fi

      - name: Show SHA-1 / SHA-256
        run: |
          echo "## EVDƏN Debug Keystore parmaq izləri" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Package name: **az.onluq.app**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          keytool -list -v -keystore android/app/evden-debug.keystore -alias androiddebugkey -storepass android -keypass android | grep -Ei "SHA1:|SHA-1:|SHA256:|SHA-256:" >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Bu SHA-1-i Google Cloud Console > Credentials > Create OAuth client ID > Android-a əlavə et." >> $GITHUB_STEP_SUMMARY

      - name: Commit keystore to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/app/evden-debug.keystore
          if git diff --staged --quiet; then
            echo "Dəyişiklik yoxdur."
          else
            git commit -m "Add fixed debug keystore for stable Google sign-in SHA-1"
            git push
          fi
